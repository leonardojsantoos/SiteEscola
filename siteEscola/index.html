<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha seu Perfil</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center aluno"> <div class="card-login">
    <h2>Quem é você?</h2>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Selecione seu perfil para continuar</p>

    <button class="tipo-btn" onclick="setTipo('aluno')">Sou Aluno</button>
    <button class="tipo-btn" onclick="setTipo('professor')" style="margin-top: 15px;">Sou Professor</button>
  </div>

  <script>
    function setTipo(tipo) {
      // Salva o papel temporário para o cadastro
      localStorage.setItem("role_temp", tipo);
      
      // Troca a classe do body para mudar o background suavemente via CSS
      document.body.className = "center " + tipo;

      // Pequena pausa para o usuário ver a troca do fundo antes de redirecionar
      setTimeout(() => {
        window.location.href = "login.html";
      }, 500);
    }
  </script>

</body>
</html>
