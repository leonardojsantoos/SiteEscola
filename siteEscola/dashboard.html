<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h2 id="titulo"></h2>
  <button onclick="logout()">Sair</button>
</div>

<div class="container grid">

  <div class="card">
    <h3>Selecionar Turma</h3>
    <select id="turmaSelect" onchange="carregarTurma()"></select>
  </div>

  <div id="painel-professor" class="card">
    <h3>Gerenciar</h3>

    <input id="nomeTurma" placeholder="Nova turma">
    <button onclick="criarTurma()">Criar Turma</button>

    <input id="nomeMateria" placeholder="Matéria">
    <button onclick="addMateria()">Adicionar Matéria</button>

    <input id="nomeAluno" placeholder="Aluno">
    <button onclick="addAluno()">Adicionar Aluno</button>
  </div>

  <div class="card card-wide">
    <h3>Boletim</h3>

    <table id="tabela">
      <thead>
        <tr>
          <th>Aluno</th>
          <th>Matéria</th>
          <th>B1</th>
          <th>B2</th>
          <th>B3</th>
          <th>B4</th>
          <th>Média</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>

</body>
</html>
