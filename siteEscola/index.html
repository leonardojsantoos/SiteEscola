<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escolha</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center aluno">

<div class="card-login">
  <h2>Quem é você?</h2>

  <button class="tipo-btn" onclick="setTipo('aluno')">Aluno</button>
  <button class="tipo-btn" onclick="setTipo('professor')">Professor</button>
</div>

<script>
function setTipo(tipo){
  localStorage.setItem("role_temp", tipo);
  
  // Aplica a classe na hora para disparar a transição do CSS
  document.body.classList.remove('aluno', 'professor');
  document.body.classList.add(tipo);

  // Espera a animação de 350ms terminar antes de mudar a URL
  setTimeout(() => {
    location.href = "login.html";
  }, 350);
}
</script>

</body>
</html>
