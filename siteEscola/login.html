<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Escolar</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center"> <div class="card-login">
    <img src="img/logo.png" class="logo" alt="Logo">
    
    <h2>Bem-vindo</h2>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Entre com as suas credenciais</p>

    <form id="formLogin">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="seu@email.com">
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required placeholder="••••••••">
      </div>

      <button type="submit">Entrar no Sistema</button>
    </form>

    <p class="auth-footer">
    Não tem uma conta? 
    <a href="cadastro.html" class="auth-link"><strong>Criar conta</strong></a>
    </p>
  </div>

  <script src="js/db.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
