<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema Escolar</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center aluno"> <div class="card-login">
  <img src="img/logo.png" class="logo" alt="Logo">
  
  <h2>Bem-vindo</h2>
  <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Entre com as suas credenciais</p>

  <form id="formLogin">
    <label>Email</label>
    <input type="email" id="email" required placeholder="seu@email.com">

    <label>Senha</label>
    <input type="password" id="senha" required placeholder="••••••••">

    <button type="submit">Entrar no Sistema</button>
  </form>

  <p class="link-text" id="criarConta">Ainda não tem conta? <strong>Criar conta</strong></p>
</div>

<script src="js/db.js"></script>
<script src="js/theme.js"></script>
<script src="js/login.js"></script>

</body>
</html>
