<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="header">
  <h2 id="titulo"></h2>
  <button onclick="logout()">Sair</button>
</div>

<div class="container">

  <div class="grid">

    <div class="card">
      <h3>Turma</h3>
      <select id="turmaSelect" onchange="render()"></select>
    </div>

    <div id="painel-professor" class="card">
      <h3>Professor</h3>

      <input id="nomeTurma" placeholder="Turma">
      <button onclick="criarTurma()">Criar</button>

      <input id="nomeMateria" placeholder="Matéria">
      <button onclick="addMateria()">Adicionar</button>

      <input id="nomeAluno" placeholder="Aluno">
      <button onclick="addAluno()">Adicionar</button>
    </div>

    <div class="card card-wide">
      <h3>Boletim</h3>

      <table>
        <thead>
          <tr>
            <th>Aluno</th>
            <th>Matéria</th>
            <th>B1</th>
            <th>B2</th>
            <th>B3</th>
            <th>B4</th>
            <th>Média</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>

  </div>

</div>

<script src="js/db.js"></script>
<script src="js/theme.js"></script>
<script src="js/app.js"></script>

</body>
</html>
